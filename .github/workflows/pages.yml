name: Deploy site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Set up Stack
        uses: haskell-actions/setup@v2
        with:
          ghc-version: 9.6.6
          enable-stack: true

      - name: Cache Stack dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.stack/programs
            ~/.stack/snapshots
            ~/.stack/indices
            ~/.stack/pantry
            ~/.stack/setup-exe-cache
          key: ${{ runner.os }}-stack-deps-${{ hashFiles('stack.yaml', 'stack.yaml.lock', 'hakyll-site.cabal') }}
          restore-keys: |
            ${{ runner.os }}-stack-deps-

      - name: Cache Stack build outputs
        uses: actions/cache@v4
        with:
          path: .stack-work
          key: ${{ runner.os }}-stack-work-${{ hashFiles('stack.yaml', 'stack.yaml.lock', 'hakyll-site.cabal') }}-${{ hashFiles('src/**/*.hs') }}
          restore-keys: |
            ${{ runner.os }}-stack-work-${{ hashFiles('stack.yaml', 'stack.yaml.lock', 'hakyll-site.cabal') }}-

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: 2.7.6
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Sass
        run: npm install -g sass@1.80.3

      - name: Build site
        run: |
          stack --system-ghc --no-install-ghc build
          stack --system-ghc --no-install-ghc exec site clean
          stack --system-ghc --no-install-ghc exec site build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
