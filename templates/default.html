<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..800;1,400..800&display=swap" rel="stylesheet">

    <script>
      (() => {
        const root = document.documentElement;
        const storageKey = "theme-preference";
        const media = window.matchMedia("(prefers-color-scheme: dark)");
        let theme = media.matches ? "dark" : "light";

        root.dataset.js = "enabled";

        try {
          const savedTheme = localStorage.getItem(storageKey);
          if (savedTheme === "light" || savedTheme === "dark") {
            theme = savedTheme;
          }
        } catch (_) {}

        root.dataset.theme = theme;
      })();
    </script>

    <link rel="stylesheet" href="/styles/katex.css" />
    <link rel="stylesheet" href="/styles/syntax.css" />
    <link rel="stylesheet" href="/styles/syntax-dark.css" />
    <link rel="stylesheet" href="/styles/main.css" />
    <link rel="shortcut icon" type="image/png" href="/images/favicon.ico" />

    <title>$title$</title>
    <meta name="description" content="$description$" />

    <!-- Meta tags for social media -->
    <meta property="og:title" content="$title$" />
    <meta property="og:description" content="$description$" />
    <meta property="og:site_name" content="Sahel Iqbal" />
    $if(image)$
    <meta property="og:image" content="https://sahel13.github.io/images/$image$" />
    $else$
    <meta property="og:image" content="https://sahel13.github.io/images/site_image.png" />
    $endif$
    <meta name="twitter:card" content="summary" />
    <!--
    Check if the `date` field is present in the metadata to determine if the page is
    a post or not.  A bit of a hack, but it works.
    -->
    $if(date)$
    <meta property="og:type" content="article" />
    <meta property="og:url" content="https://sahel13.github.io$url$" />
    $else$
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://sahel13.github.io" />
    $endif$

    PostHog for analytics

  </head>
  <body>
      <header>
          <nav>
        <a href="/">Home</a>
        <a href="/blog.html">Blog</a>
        <a href="/atom.xml">Feed</a>
      </nav>
      <button class="theme-toggle" type="button" aria-label="Switch to dark mode" aria-pressed="false" title="Switch to dark mode">
        <span class="theme-toggle__icon theme-toggle__icon--sun" aria-hidden="true">
          <svg viewBox="0 0 24 24" focusable="false">

    </header>
    <main role="main">
      $body$
    </main>
    <footer class="site-footer">
      <a href="https://github.com/Sahel13/Sahel13.github.io">Website source</a>
    </footer>
    <script src="/scripts/theme.js"></script>
  </body>
</html>
