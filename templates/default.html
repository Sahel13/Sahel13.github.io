<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <script>
      (() => {
        const root = document.documentElement;
        const storageKey = "theme-preference";
        const media = window.matchMedia("(prefers-color-scheme: dark)");
        let theme = media.matches ? "dark" : "light";

        root.dataset.js = "enabled";

        try {
          const savedTheme = localStorage.getItem(storageKey);
          if (savedTheme === "light" || savedTheme === "dark") {
            theme = savedTheme;
          }
        } catch (_) {}

        root.dataset.theme = theme;
      })();
    </script>

    <link rel="stylesheet" href="/styles/katex.css" />
    <link rel="stylesheet" href="/styles/syntax.css" />
    <link rel="stylesheet" href="/styles/syntax-dark.css" />
    <link rel="stylesheet" href="/styles/main.css" />
    <link rel="shortcut icon" type="image/png" href="/images/favicon.ico" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..800;1,400..800&display=swap" rel="stylesheet">

    <title>$title$</title>
    <meta name="description" content="$description$" />

    <!-- Meta tags for social media -->
    <meta property="og:title" content="$title$" />
    <meta property="og:description" content="$description$" />
    <meta property="og:site_name" content="Sahel Iqbal" />
    $if(image)$
    <meta property="og:image" content="https://sahel13.github.io/images/$image$" />
    $else$
    <meta property="og:image" content="https://sahel13.github.io/images/site_image.png" />
    $endif$
    <meta name="twitter:card" content="summary" />
    <!--
    Check if the `date` field is present in the metadata to determine if the page is
    a post or not.  A bit of a hack, but it works.
    -->
    $if(date)$
    <meta property="og:type" content="article" />
    <meta property="og:url" content="https://sahel13.github.io$url$" />
    $else$
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://sahel13.github.io" />
    $endif$
  </head>
  <body>
    <header>
      <nav>
        <a href="/">Home</a>
        <a href="/blog.html">Blog</a>
        <a href="/atom.xml">Feed</a>
      </nav>
      <button class="theme-toggle" type="button" aria-label="Switch to dark mode" aria-pressed="false" title="Switch to dark mode">
        <span class="theme-toggle__icon theme-toggle__icon--sun" aria-hidden="true">
          <svg viewBox="0 0 24 24" focusable="false">
            <circle cx="12" cy="12" r="4.5" fill="currentColor" />
            <path d="M12 1.75V4.25M12 19.75V22.25M4.75 4.75L6.5 6.5M17.5 17.5L19.25 19.25M1.75 12H4.25M19.75 12H22.25M4.75 19.25L6.5 17.5M17.5 6.5L19.25 4.75" fill="none" stroke="currentColor" stroke-linecap="round" stroke-width="1.75" />
          </svg>
        </span>
        <span class="theme-toggle__icon theme-toggle__icon--moon" aria-hidden="true">
          <svg viewBox="0 0 24 24" focusable="false">
            <path d="M15.75 2.75C13.45 4.1 12 6.58 12 9.33C12 13.48 15.36 16.84 19.5 16.84C20.16 16.84 20.81 16.75 21.42 16.58C19.82 19.33 16.85 21.17 13.46 21.17C8.36 21.17 4.23 17.04 4.23 11.94C4.23 7.95 6.76 4.55 10.31 3.24C11.38 2.85 12.53 2.66 13.69 2.66C14.39 2.66 15.08 2.73 15.75 2.75Z" fill="currentColor" />
          </svg>
        </span>
      </button>
    </header>
    <main role="main">
      $body$
    </main>
    <footer class="site-footer">
      <a href="https://github.com/Sahel13/Sahel13.github.io">Website source</a>
    </footer>
    <script src="/scripts/theme.js"></script>
  </body>
</html>
